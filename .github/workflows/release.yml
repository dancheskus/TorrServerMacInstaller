name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v1.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build DMG and publish release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG_NAME="${{ inputs.tag_name }}"
          else
            TAG_NAME="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG_NAME" =~ ^v[0-9]+(\.[0-9]+)*([.-][A-Za-z0-9]+)*$ ]]; then
            echo "Tag must look like v1.0.0, got: $TAG_NAME" >&2
            exit 1
          fi

          VERSION="${TAG_NAME#v}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Build app, ZIP, and DMG
        shell: bash
        env:
          APP_VERSION: ${{ steps.release.outputs.version }}
          BUILD_NUMBER: ${{ steps.release.outputs.build_number }}
        run: ./scripts/build-app.sh

      - name: Verify DMG
        shell: bash
        run: hdiutil verify dist/TorrServerMacInstaller.dmg

      - name: Prepare release assets
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ steps.release.outputs.tag_name }}"
          cp dist/TorrServerMacInstaller.dmg "dist/TorrServerMacInstaller-$TAG_NAME.dmg"
          cp dist/TorrServerMacInstaller.zip "dist/TorrServerMacInstaller-$TAG_NAME.zip"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ steps.release.outputs.tag_name }}"
          RELEASE_TITLE="TorrServer Mac Installer $TAG_NAME"

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" \
              "dist/TorrServerMacInstaller-$TAG_NAME.dmg" \
              "dist/TorrServerMacInstaller-$TAG_NAME.zip" \
              --clobber
          else
            gh release create "$TAG_NAME" \
              "dist/TorrServerMacInstaller-$TAG_NAME.dmg" \
              "dist/TorrServerMacInstaller-$TAG_NAME.zip" \
              --title "$RELEASE_TITLE" \
              --target "$GITHUB_SHA" \
              --notes "Drag TorrServerMacInstaller.app into Applications from the DMG."
          fi
